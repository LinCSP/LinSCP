name: Release

# Triggered by a version tag: v0.1.0, v1.2.3-rc1, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

env:
  LIBSSH_VERSION: "0.10.6"
  QT_VERSION: "6.7.3"

jobs:
  # ─── AppImage (Arch Linux — system Qt6 with XCB + Wayland out of the box) ─────
  appimage:
    name: AppImage (x86_64, Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git cmake ninja pkg-config gcc \
            qt6-base qt6-svg qt6-wayland qt6-tools \
            libssh openssl \
            librsvg patchelf wget fuse2

      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/linscp AppDir/usr/bin/
          cp packaging/appimage/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          rsvg-convert -w 256 -h 256 \
            packaging/appimage/linscp.svg \
            -o packaging/appimage/linscp.png

      - name: Create AppImage
        env:
          VERSION: ${{ github.ref_name }}
          # plugin-qt is also an AppImage — needs extract-and-run in Docker
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          # Both linuxdeploy and linuxdeploy-plugin-qt bundle an old strip that
          # doesn't understand RELR ELF sections used by modern Arch libraries.
          # Solution: extract both AppImages, patch their bundled strip, run extracted.

          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-extracted
          ln -sf /bin/true linuxdeploy-extracted/usr/bin/strip

          ./linuxdeploy-plugin-qt-x86_64.AppImage --appimage-extract
          mv squashfs-root plugin-qt-extracted
          ln -sf /bin/true plugin-qt-extracted/usr/bin/strip

          # Replace plugin AppImage with a wrapper that runs the patched extraction
          printf '#!/bin/sh\nexec "%s/plugin-qt-extracted/AppRun" "$@"\n' "$(pwd)" \
            > linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

          export PATH="$(pwd):$PATH"
          export QMAKE=/usr/bin/qmake6
          ./linuxdeploy-extracted/AppRun \
            --appdir AppDir \
            --plugin qt \
            --desktop-file packaging/appimage/linscp.desktop \
            --icon-file packaging/appimage/linscp.png \
            --output appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: LinSCP-*.AppImage
          if-no-files-found: error

  # ─── .deb (ubuntu-22.04, Qt bundled via linuxdeploy) ─────────────────────────
  deb:
    name: .deb (x86_64, ubuntu-22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build pkg-config g++ python3-pip ruby-dev \
            libssl-dev librsvg2-bin patchelf \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-xinerama0-dev libxcb-cursor-dev libxkbcommon-x11-dev \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-render0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xkb1 \
            libfuse2

      # ── libssh 0.10 ──────────────────────────────────────────────────────────
      - name: Cache libssh ${{ env.LIBSSH_VERSION }}
        id: cache-libssh
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/libssh-install
          key: libssh-${{ env.LIBSSH_VERSION }}-ubuntu22-${{ runner.arch }}-v1

      - name: Build libssh ${{ env.LIBSSH_VERSION }} from source
        if: steps.cache-libssh.outputs.cache-hit != 'true'
        run: |
          wget -q "https://www.libssh.org/files/0.10/libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          tar xf "libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          cmake -S "libssh-${{ env.LIBSSH_VERSION }}" -B libssh-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/libssh-install" \
            -DWITH_EXAMPLES=OFF -DWITH_TESTS=OFF -DWITH_BENCHMARKS=OFF
          cmake --build libssh-build -j$(nproc)
          cmake --install libssh-build

      # ── Qt via aqtinstall ────────────────────────────────────────────────────
      - name: Cache Qt ${{ env.QT_VERSION }}
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-${{ env.QT_VERSION }}-linux-v3

      - name: Install Qt ${{ env.QT_VERSION }}
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt linux desktop "${{ env.QT_VERSION }}" linux_gcc_64 \
            -O "${{ runner.temp }}/Qt"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Configure
        run: |
          QT_PREFIX=$(find "${{ runner.temp }}/Qt" -name "Qt6Config.cmake" 2>/dev/null \
            | head -1 | sed 's|/lib/cmake/Qt6/Qt6Config.cmake||')
          echo "Qt prefix: ${QT_PREFIX}"
          echo "QT_PREFIX=${QT_PREFIX}" >> "$GITHUB_ENV"
          LIBSSH_DIR="${{ runner.temp }}/libssh-install"
          export PKG_CONFIG_PATH="${LIBSSH_DIR}/lib/pkgconfig:${LIBSSH_DIR}/lib64/pkgconfig"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_PREFIX};${LIBSSH_DIR}"

      - name: Build
        run: cmake --build build -j$(nproc)

      # ── Bundle Qt into AppDir (reused for .deb) ──────────────────────────────
      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/linscp AppDir/usr/bin/
          rsvg-convert -w 256 -h 256 \
            packaging/appimage/linscp.svg \
            -o packaging/appimage/linscp.png

      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Bundle Qt into AppDir
        env:
          LIBSSH_DIR: ${{ runner.temp }}/libssh-install
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          export QMAKE="${QT_PREFIX}/bin/qmake"
          export LD_LIBRARY_PATH="${QT_PREFIX}/lib:${LIBSSH_DIR}/lib:${LIBSSH_DIR}/lib64"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file packaging/appimage/linscp.desktop \
            --icon-file packaging/appimage/linscp.png

      # ── .deb via fpm (bundled Qt in /opt/linscp, wrapper in /usr/bin) ────────
      - name: Create .deb
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          sudo gem install --no-document fpm

          DEB_VERSION="${VERSION#v}"

          mkdir -p deb-root/opt/linscp \
                   deb-root/usr/bin \
                   deb-root/usr/share/applications \
                   deb-root/usr/share/icons/hicolor/scalable/apps

          # Copy bundled Qt + binary (AppDir/usr → /opt/linscp)
          rsync -a AppDir/usr/ deb-root/opt/linscp/

          # Wrapper: sets Qt paths, launches binary
          cat > deb-root/usr/bin/linscp << 'WRAPPER'
          #!/bin/sh
          export QT_PLUGIN_PATH=/opt/linscp/plugins
          export LD_LIBRARY_PATH=/opt/linscp/lib
          exec /opt/linscp/bin/linscp "$@"
          WRAPPER
          chmod +x deb-root/usr/bin/linscp

          cp packaging/appimage/linscp.desktop \
             deb-root/usr/share/applications/
          cp packaging/appimage/linscp.svg \
             deb-root/usr/share/icons/hicolor/scalable/apps/

          fpm -s dir -t deb \
            -n linscp \
            -v "${DEB_VERSION}" \
            -C deb-root \
            --description "SSH/SFTP file manager — Linux analog of WinSCP" \
            --license "GPL-2.0" \
            --url "https://github.com/LinCSP/LinSCP" \
            --maintainer "LinSCP <https://github.com/LinCSP/LinSCP>" \
            --category "net" \
            --depends "libxcb-xinerama0" \
            --depends "libxkbcommon-x11-0" \
            .

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: linscp_*.deb
          if-no-files-found: error

  # ─── .rpm (Fedora 39, system Qt 6.6) ─────────────────────────────────────────
  rpm:
    name: RPM (Fedora 39)
    runs-on: ubuntu-latest
    container:
      image: fedora:39
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            cmake ninja-build pkg-config gcc-c++ git \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel \
            libssh-devel openssl-devel \
            rpm-build

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package RPM
        run: cpack -G RPM --config build/CPackConfig.cmake -B build/packages

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: build/packages/*.rpm
          if-no-files-found: error

  # ─── Windows NSIS installer (x64, MSVC) ─────────────────────────────────────
  windows:
    name: Windows (.exe installer, x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Set up MSVC developer environment (needed for Ninja + cl.exe)
      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      # ── libssh + OpenSSL via vcpkg ───────────────────────────────────────────
      - name: Cache vcpkg packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-libssh-${{ env.LIBSSH_VERSION }}-openssl-v1

      - name: Install libssh and OpenSSL via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install libssh:x64-windows openssl:x64-windows

      # ── Qt via aqtinstall ────────────────────────────────────────────────────
      - name: Cache Qt ${{ env.QT_VERSION }}
        id: cache-qt-win
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\Qt
          key: qt-${{ env.QT_VERSION }}-windows-v1

      - name: Install Qt ${{ env.QT_VERSION }}
        if: steps.cache-qt-win.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2019_64 `
            -O "${{ runner.temp }}\Qt"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Configure
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: |
          $qtPrefix = (Get-ChildItem "${{ runner.temp }}\Qt" -Recurse `
            -Filter "Qt6Config.cmake" | Select-Object -First 1).DirectoryName `
            -replace "\\lib\\cmake\\Qt6", ""
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$qtPrefix;C:\vcpkg\installed\x64-windows" `
            -DWITH_KEYRING=OFF

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      # ── Bundle Qt DLLs + vcpkg DLLs ─────────────────────────────────────────
      - name: Deploy (windeployqt + copy DLLs)
        run: |
          $qtPrefix = (Get-ChildItem "${{ runner.temp }}\Qt" -Recurse `
            -Filter "Qt6Config.cmake" | Select-Object -First 1).DirectoryName `
            -replace "\\lib\\cmake\\Qt6", ""
          New-Item -ItemType Directory -Path deploy | Out-Null
          Copy-Item build\bin\linscp.exe deploy\
          & "$qtPrefix\bin\windeployqt.exe" --release deploy\linscp.exe
          Copy-Item "C:\vcpkg\installed\x64-windows\bin\*.dll" deploy\

      # ── NSIS installer ───────────────────────────────────────────────────────
      - name: Create installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          makensis /DVERSION=${{ github.ref_name }} packaging\nsis\linscp.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: LinSCP-*-windows-x64.exe
          if-no-files-found: error

  # ─── macOS .dmg (arm64, macos-latest) ───────────────────────────────────────
  macos:
    name: macOS (.dmg, arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja pkg-config libssh openssl qt

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix libssh)/lib/pkgconfig:$(brew --prefix openssl)/lib/pkgconfig"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DWITH_KEYRING=OFF

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Create .dmg
        run: |
          $(brew --prefix qt)/bin/macdeployqt build/bin/linscp.app -dmg
          mv build/bin/linscp.dmg "LinSCP-${{ github.ref_name }}-macos-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: LinSCP-*.dmg
          if-no-files-found: error

  # ─── Publish GitHub Release ───────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [appimage, deb, rpm, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Delete existing release/tag if left from a failed previous run
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Collect artifacts explicitly (globs may not expand in gh args)
          FILES=()
          for f in dist/*.AppImage dist/*.deb dist/*.rpm dist/*.dmg dist/*.exe; do
            [ -f "$f" ] && FILES+=("$f")
          done
          echo "Uploading: ${FILES[*]}"

          # Mark as prerelease if tag contains a/b/rc (e.g. v0.1.0a1, v1.0.0rc2)
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '[0-9](a|b|rc)[0-9]'; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "LinSCP $TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            "${FILES[@]}"
