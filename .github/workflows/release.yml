name: Release

# Triggered by a version tag: v0.1.0, v1.2.3-rc1, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+*'

env:
  LIBSSH_VERSION: "0.10.6"
  QT_VERSION: "6.7.3"

jobs:
  appimage:
    name: AppImage (x86_64)
    # ubuntu-22.04 → glibc 2.35 → widest distro compatibility
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build pkg-config g++ python3-pip \
            libssl-dev librsvg2-bin patchelf \
            libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-xinerama0-dev libxcb-cursor-dev libxkbcommon-x11-dev

      # ── libssh 0.10 (shared cache with CI job) ───────────────────────────────
      - name: Cache libssh ${{ env.LIBSSH_VERSION }}
        id: cache-libssh
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/libssh-install
          key: libssh-${{ env.LIBSSH_VERSION }}-ubuntu22-${{ runner.arch }}-v1

      - name: Build libssh ${{ env.LIBSSH_VERSION }} from source
        if: steps.cache-libssh.outputs.cache-hit != 'true'
        run: |
          wget -q "https://www.libssh.org/files/0.10/libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          tar xf "libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          cmake -S "libssh-${{ env.LIBSSH_VERSION }}" -B libssh-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/libssh-install" \
            -DWITH_EXAMPLES=OFF -DWITH_TESTS=OFF -DWITH_BENCHMARKS=OFF
          cmake --build libssh-build -j$(nproc)
          cmake --install libssh-build

      # ── Qt via aqtinstall ────────────────────────────────────────────────────
      - name: Cache Qt ${{ env.QT_VERSION }}
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-${{ env.QT_VERSION }}-linux-gcc_64-v2

      - name: Install Qt ${{ env.QT_VERSION }}
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          # aqt 3.x: Linux Desktop arch is "linux_gcc_64" (not "gcc_64")
          aqt install-qt linux desktop "${{ env.QT_VERSION }}" linux_gcc_64 \
            -O "${{ runner.temp }}/Qt"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Configure (Release)
        run: |
          export PKG_CONFIG_PATH="${{ runner.temp }}/libssh-install/lib/pkgconfig:${{ runner.temp }}/libssh-install/lib64/pkgconfig"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/linux_gcc_64;${{ runner.temp }}/libssh-install" \
            -DWITH_TERMINAL=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      # ── AppDir ───────────────────────────────────────────────────────────────
      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/bin/linscp AppDir/usr/bin/

          # Convert SVG icon → PNG 256×256 (rsvg-convert avoids ImageMagick policy issues)
          rsvg-convert -w 256 -h 256 \
            packaging/appimage/linscp.svg \
            -o packaging/appimage/linscp.png

      # ── linuxdeploy ──────────────────────────────────────────────────────────
      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        env:
          VERSION: ${{ github.ref_name }}
          QT_DIR: ${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/linux_gcc_64
          LIBSSH_DIR: ${{ runner.temp }}/libssh-install
        run: |
          export QMAKE="${QT_DIR}/bin/qmake"
          export LD_LIBRARY_PATH="${QT_DIR}/lib:${LIBSSH_DIR}/lib:${LIBSSH_DIR}/lib64"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file packaging/appimage/linscp.desktop \
            --icon-file packaging/appimage/linscp.png \
            --output appimage

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinSCP-${{ github.ref_name }}-x86_64
          path: LinSCP-*.AppImage
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APPIMAGE=$(ls LinSCP-*.AppImage | head -1)
          gh release create "${{ github.ref_name }}" \
            --title "LinSCP ${{ github.ref_name }}" \
            --generate-release-notes \
            "$APPIMAGE"
