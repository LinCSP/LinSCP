name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

env:
  LIBSSH_VERSION: "0.10.6"
  QT_VERSION: "6.7.3"

jobs:
  # ─── Ubuntu 22.04 ────────────────────────────────────────────────────────────
  # Ubuntu 22.04 ships libssh 0.9.6 (need ≥0.10) and Qt 6.2 (need ≥6.5),
  # so both are built/installed from source.
  build-ubuntu:
    name: Ubuntu 22.04
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build pkg-config g++ python3-pip \
            libssl-dev librsvg2-bin \
            libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0

      # ── libssh 0.10 ──────────────────────────────────────────────────────────
      - name: Cache libssh ${{ env.LIBSSH_VERSION }}
        id: cache-libssh
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/libssh-install
          key: libssh-${{ env.LIBSSH_VERSION }}-ubuntu22-${{ runner.arch }}-v1

      - name: Build libssh ${{ env.LIBSSH_VERSION }} from source
        if: steps.cache-libssh.outputs.cache-hit != 'true'
        run: |
          wget -q "https://www.libssh.org/files/0.10/libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          tar xf "libssh-${{ env.LIBSSH_VERSION }}.tar.xz"
          cmake -S "libssh-${{ env.LIBSSH_VERSION }}" -B libssh-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${{ runner.temp }}/libssh-install" \
            -DWITH_EXAMPLES=OFF -DWITH_TESTS=OFF -DWITH_BENCHMARKS=OFF
          cmake --build libssh-build -j$(nproc)
          cmake --install libssh-build

      # ── Qt 6.5+ via aqtinstall ───────────────────────────────────────────────
      - name: Cache Qt ${{ env.QT_VERSION }}
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/Qt
          key: qt-${{ env.QT_VERSION }}-linux-gcc_64-v2

      - name: Install Qt ${{ env.QT_VERSION }}
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          # aqt 3.x: Linux Desktop arch is "linux_gcc_64" (not "gcc_64")
          aqt install-qt linux desktop "${{ env.QT_VERSION }}" linux_gcc_64 \
            -O "${{ runner.temp }}/Qt"

      # ── Configure & Build ────────────────────────────────────────────────────
      - name: Configure
        run: |
          export PKG_CONFIG_PATH="${{ runner.temp }}/libssh-install/lib/pkgconfig:${{ runner.temp }}/libssh-install/lib64/pkgconfig"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ runner.temp }}/Qt/${{ env.QT_VERSION }}/linux_gcc_64;${{ runner.temp }}/libssh-install" \
            -DWITH_TERMINAL=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

  # ─── Fedora 39 ───────────────────────────────────────────────────────────────
  # Fedora 39 ships Qt 6.6.x and libssh ≥0.10 — all deps available via dnf.
  build-fedora:
    name: Fedora 39
    runs-on: ubuntu-latest
    container:
      image: fedora:39
      options: --user root

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            cmake ninja-build pkg-config gcc-c++ git \
            qt6-qtbase-devel qt6-qttools-devel \
            libssh-devel openssl-devel

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_TERMINAL=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure
