name: Debug Windows

on:
  workflow_dispatch:

env:
  LIBSSH_VERSION: "0.10.6"
  QT_VERSION: "6.7.3"

jobs:
  debug:
    name: Windows Debug (console)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-libssh-${{ env.LIBSSH_VERSION }}-openssl-pkgconf-v1

      - name: Install vcpkg packages
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install libssh:x64-windows openssl:x64-windows pkgconf:x64-windows

      - name: Cache Qt ${{ env.QT_VERSION }}
        id: cache-qt-win
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\Qt
          key: qt-${{ env.QT_VERSION }}-windows-v1

      - name: Install Qt ${{ env.QT_VERSION }}
        if: steps.cache-qt-win.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2019_64 `
            -O "${{ runner.temp }}\Qt"

      # RelWithDebInfo — release CRT (no ucrtbased.dll)
      # LINSCP_STARTLOG=1 writes linscp_startup.log next to the .exe — works for any subsystem
      - name: Configure (RelWithDebInfo, startup log)
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
          PKG_CONFIG: C:\vcpkg\installed\x64-windows\tools\pkgconf\pkgconf.exe
        run: |
          $qtPrefix = (Get-ChildItem "${{ runner.temp }}\Qt" -Recurse `
            -Filter "Qt6Config.cmake" | Select-Object -First 1).DirectoryName `
            -replace "\\lib\\cmake\\Qt6", ""
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DCMAKE_PREFIX_PATH="$qtPrefix;C:\vcpkg\installed\x64-windows" `
            -DPKG_CONFIG_EXECUTABLE="C:\vcpkg\installed\x64-windows\tools\pkgconf\pkgconf.exe" `
            -DWITH_KEYRING=OFF `
            -DCMAKE_CXX_FLAGS="-DLINSCP_STARTLOG=1"

      - name: Build
        run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

      - name: Bundle Qt DLLs
        run: |
          $qtPrefix = (Get-ChildItem "${{ runner.temp }}\Qt" -Recurse `
            -Filter "Qt6Config.cmake" | Select-Object -First 1).DirectoryName `
            -replace "\\lib\\cmake\\Qt6", ""
          New-Item -ItemType Directory -Path deploy -Force | Out-Null
          Copy-Item build\bin\linscp.exe deploy\

          & "$qtPrefix\bin\windeployqt.exe" --release deploy\linscp.exe
          Write-Host "windeployqt exit: $LASTEXITCODE"

          # Check critical plugin
          if (-not (Test-Path "deploy\platforms\qwindows.dll")) {
            Write-Warning "MISSING: deploy\platforms\qwindows.dll — app will not show a window!"
          } else {
            Write-Host "OK: platforms\qwindows.dll present"
          }

          # Copy vcpkg DLLs (libssh, openssl, etc.)
          $dlls = Get-ChildItem "C:\vcpkg\installed\x64-windows\bin\*.dll" -ErrorAction SilentlyContinue
          if ($dlls) { Copy-Item $dlls.FullName deploy\; Write-Host "Copied $($dlls.Count) vcpkg DLLs" }

          # Full listing for diagnostics
          Write-Host "--- deploy\ tree ---"
          Get-ChildItem deploy\ -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName.Replace((Get-Location).Path + '\deploy\', ''))"
          }

      - name: Upload debug build
        uses: actions/upload-artifact@v4
        with:
          name: linscp-debug-windows
          path: deploy\
          if-no-files-found: error
